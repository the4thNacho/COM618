<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Medical Data Analysis{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #333; }

        nav {
            background: #1a5c38;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 0;
        }
        nav .brand {
            color: #ecf0f1;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 1rem 1.5rem 1rem 0;
            border-right: 1px solid #2d7a50;
            margin-right: 1rem;
        }
        nav a {
            color: #a8d5b8;
            text-decoration: none;
            padding: 1rem 1rem;
            display: inline-block;
            font-size: 0.9rem;
            transition: color 0.2s, background 0.2s;
        }
        nav a:hover, nav a.active {
            color: #fff;
            background: #236b45;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        h1 { font-size: 1.8rem; margin-bottom: 0.4rem; color: #1a5c38; }
        h2 { font-size: 1.3rem; margin-bottom: 1rem; color: #236b45; }
        .subtitle { color: #666; margin-bottom: 1.5rem; font-size: 0.95rem; }

        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
        }
        .card h2 { margin-top: 0; }

        .img-full { width: 100%; height: auto; border-radius: 4px; }
        .img-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .img-grid .card { margin-bottom: 0; }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge-blue { background: #d6eaf8; color: #1a5276; }
        .badge-red { background: #fadbd8; color: #922b21; }
        .badge-green { background: #d5f5e3; color: #1e8449; }
        .badge-grey { background: #eaecee; color: #555; }

        .stat-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .stat-box {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 1rem 1.5rem;
            text-align: center;
            flex: 1;
            min-width: 140px;
        }
        .stat-box .val { font-size: 2rem; font-weight: 700; color: #1a5c38; }
        .stat-box .lbl { font-size: 0.8rem; color: #666; margin-top: 0.25rem; }

        .insight {
            background: #eaf7ee;
            border-left: 4px solid #27ae60;
            border-radius: 0 6px 6px 0;
            padding: 0.8rem 1rem;
            margin-top: auto;
            font-size: 0.9rem;
            color: #1a5c38;
        }

        form .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
        .form-group label { font-size: 0.85rem; font-weight: 600; color: #555; }
        .form-group input, .form-group select {
            padding: 0.5rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.95rem;
        }
        .btn {
            display: inline-block;
            padding: 0.65rem 1.6rem;
            background: #1a5c38;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        .btn:hover { background: #236b45; }

        .result-box {
            background: #f0faf4;
            border: 2px solid #27ae60;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }
        .result-box h3 { margin-bottom: 0.5rem; color: #1a5c38; }
        .prob-bar-wrap { margin: 0.4rem 0; }
        .prob-label { font-size: 0.85rem; color: #555; margin-bottom: 0.2rem; }
        .prob-bar-bg { background: #ddd; border-radius: 4px; height: 18px; }
        .prob-bar-fill {
            height: 18px;
            border-radius: 4px;
            transition: width 0.5s;
        }
        .prob-bar-fill.diabetes { background: #2980b9; }
        .prob-bar-fill.heart { background: #e74c3c; }

        footer {
            text-align: center;
            color: #aaa;
            font-size: 0.8rem;
            padding: 2rem 0 1rem;
        }
    </style>
</head>
<body>
<nav>
    <span class="brand">COM618 Medical Data</span>
    <a href="/" {% if request.endpoint == 'index' %}class="active"{% endif %}>Home</a>
    <a href="/cleaning" {% if request.endpoint == 'cleaning' %}class="active"{% endif %}>Data Cleaning</a>
    <a href="/exploration" {% if request.endpoint == 'exploration' %}class="active"{% endif %}>Exploration</a>
    <a href="/model" {% if request.endpoint == 'model' %}class="active"{% endif %}>Prediction Model</a>
    <a href="/performance" {% if request.endpoint == 'performance' %}class="active"{% endif %}>Performance</a>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<footer>COM618 Assessment &mdash; Medical Data Analysis Pipeline</footer>
</body>
</html>
